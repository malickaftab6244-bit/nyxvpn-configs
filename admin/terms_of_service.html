<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="NyxVPN - Secure, Fast, and Private VPN Service">
    <meta name="theme-color" content="#6C63FF">
    <title>NyxVPN - Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .meta {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }

        .content-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
            display: inline-block;
        }

        .section-content {
            color: #555;
            line-height: 1.7;
            font-size: 16px;
        }

        .section-content p {
            margin-bottom: 15px;
        }

        .section-content ul, .section-content ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .section-content li {
            margin-bottom: 8px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .feature-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            transition: transform 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .feature-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .feature-desc {
            font-size: 13px;
            color: #666;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .stat-card {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-radius: 20px;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .contact-item:hover {
            background: #e9ecef;
        }

        .contact-icon {
            width: 40px;
            height: 40px;
            background: #667eea20;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 20px;
        }

        .contact-text {
            flex: 1;
            color: #333;
        }

        .contact-arrow {
            color: #999;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: white;
            font-size: 12px;
        }

        .footer a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
        }

        .footer a:hover {
            opacity: 1;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            color: #667eea;
            font-weight: 500;
            margin-bottom: 20px;
            transition: transform 0.3s;
            cursor: pointer;
            border: none;
            font-size: 14px;
        }

        .back-button:hover {
            transform: translateX(-5px);
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .header {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            .content-card {
                padding: 25px;
            }
            
            .section-title {
                font-size: 20px;
            }
            
            .features-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <button onclick="goBack()" class="back-button">
            ← Back
        </button>
        
        <div class="header">
            <h1 id="pageTitle">Loading...</h1>
            <div class="meta" id="metaInfo"></div>
        </div>
        
        <div class="content-card" id="content">
            <div style="text-align: center; padding: 40px;">
                <div class="loader"></div>
                <p>Loading content...</p>
            </div>
        </div>
        
        <div class="footer">
            <p>&copy; 2024 NyxVPN. All rights reserved.</p>
        </div>
    </div>

    <script>
        function goBack() {
            if (document.referrer) {
                window.location.href = document.referrer;
            } else {
                window.history.back();
            }
        }

        // Get the page type from the current file name
        const path = window.location.pathname;
        let pageType = 'about_us';
        
        if (path.includes('privacy_policy')) {
            pageType = 'privacy_policy';
        } else if (path.includes('terms_of_service')) {
            pageType = 'terms_of_service';
        } else {
            pageType = 'about_us';
        }
        
        // Update page title
        if (pageType === 'about_us') {
            document.title = 'NyxVPN - About Us';
        } else if (pageType === 'privacy_policy') {
            document.title = 'NyxVPN - Privacy Policy';
        } else {
            document.title = 'NyxVPN - Terms of Service';
        }
        
        async function loadContent() {
            try {
                const response = await fetch(`https://malickaftab6244-bit.github.io/nyxvpn-configs/api/${pageType}.json`);
                const data = await response.json();
                
                document.getElementById('pageTitle').textContent = data.title || 'NyxVPN';
                
                const metaInfo = document.getElementById('metaInfo');
                if (data.last_updated) {
                    metaInfo.innerHTML = `Last updated: ${data.last_updated} | Version: ${data.version || '1.0'}`;
                }
                
                if (pageType === 'about_us') {
                    renderAboutUs(data);
                } else {
                    renderPolicy(data);
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('content').innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <p style="color: red;">Failed to load content. Please try again later.</p>
                        <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 10px; cursor: pointer;">Retry</button>
                    </div>
                `;
            }
        }
        
        function renderAboutUs(data) {
            let statsHtml = '';
            if (data.statistics) {
                statsHtml = `
                    <div class="stats-grid">
                        ${data.statistics.servers ? `<div class="stat-card"><div class="stat-number">${data.statistics.servers}</div><div class="stat-label">Servers</div></div>` : ''}
                        ${data.statistics.countries ? `<div class="stat-card"><div class="stat-number">${data.statistics.countries}</div><div class="stat-label">Countries</div></div>` : ''}
                        ${data.statistics.users ? `<div class="stat-card"><div class="stat-number">${data.statistics.users}</div><div class="stat-label">Users</div></div>` : ''}
                        ${data.statistics.uptime ? `<div class="stat-card"><div class="stat-number">${data.statistics.uptime}</div><div class="stat-label">Uptime</div></div>` : ''}
                    </div>
                `;
            }
            
            let featuresHtml = '';
            if (data.features && data.features.length > 0) {
                featuresHtml = `
                    <div class="section">
                        <h2 class="section-title">Features</h2>
                        <div class="features-grid">
                            ${data.features.map(feature => `
                                <div class="feature-card">
                                    <div class="feature-icon">${feature.icon || '🔒'}</div>
                                    <div class="feature-title">${feature.title}</div>
                                    <div class="feature-desc">${feature.description || feature.content}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            let contactHtml = '';
            if (data.contact) {
                contactHtml = `
                    <div class="section">
                        <h2 class="section-title">Contact Us</h2>
                        ${data.contact.email ? `
                            <div class="contact-item" onclick="window.location.href='mailto:${data.contact.email}'">
                                <div class="contact-icon">📧</div>
                                <div class="contact-text">${data.contact.email}</div>
                                <div class="contact-arrow">→</div>
                            </div>
                        ` : ''}
                        ${data.contact.website ? `
                            <div class="contact-item" onclick="window.open('${data.contact.website}', '_blank')">
                                <div class="contact-icon">🌐</div>
                                <div class="contact-text">${data.contact.website}</div>
                                <div class="contact-arrow">→</div>
                            </div>
                        ` : ''}
                        ${data.contact.support_hours ? `
                            <div class="contact-item">
                                <div class="contact-icon">🕐</div>
                                <div class="contact-text">${data.contact.support_hours}</div>
                            </div>
                        ` : ''}
                    </div>
                `;
            }
            
            const html = `
                ${data.tagline ? `<div class="section"><p style="font-size: 18px; color: #667eea; font-weight: 500;">${data.tagline}</p></div>` : ''}
                ${data.description ? `<div class="section"><p>${data.description}</p></div>` : ''}
                ${statsHtml}
                ${data.story ? `<div class="section"><h2 class="section-title">Our Story</h2><div class="section-content">${data.story}</div></div>` : ''}
                ${data.mission ? `<div class="section"><h2 class="section-title">Mission</h2><div class="section-content">${data.mission}</div></div>` : ''}
                ${data.vision ? `<div class="section"><h2 class="section-title">Vision</h2><div class="section-content">${data.vision}</div></div>` : ''}
                ${featuresHtml}
                ${contactHtml}
            `;
            
            document.getElementById('content').innerHTML = html;
        }
        
        function renderPolicy(data) {
            let html = '';
            
            if (data.introduction) {
                html += `<div class="section"><div class="section-content" style="background: #f8f9fa; padding: 20px; border-radius: 20px;">${data.introduction}</div></div>`;
            }
            
            if (data.sections && data.sections.length > 0) {
                html += data.sections.map(section => `
                    <div class="section">
                        <h2 class="section-title">${section.title}</h2>
                        <div class="section-content" style="white-space: pre-line;">${section.content}</div>
                    </div>
                `).join('');
            }
            
            document.getElementById('content').innerHTML = html || '<p>Content not available.</p>';
        }
        
        loadContent();
    </script>
</body>
</html>
