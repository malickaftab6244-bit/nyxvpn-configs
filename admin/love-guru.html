<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ FLAMES Love Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
overflow:hidden;
background:linear-gradient(135deg,#ff416c,#ff4b2b);
position:relative;
}

.container{

width:420px;
padding:35px;
border-radius:30px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(15px);

box-shadow:
0 10px 35px rgba(0,0,0,.3);

text-align:center;

color:white;

z-index:10;
}

h1{
font-size:34px;
margin-bottom:10px;
}

.subtitle{
margin-bottom:25px;
opacity:.85;
font-size:14px;
}

.inputBox{
margin-bottom:18px;
}

input{

width:100%;
padding:15px;

border:none;
outline:none;

border-radius:15px;

font-size:15px;

background:rgba(255,255,255,.2);

color:white;

}

input::placeholder{

color:rgba(255,255,255,.7);

}

button{

width:100%;
padding:15px;

border:none;

border-radius:15px;

cursor:pointer;

font-size:16px;

font-weight:700;

background:white;

color:#ff416c;

transition:.4s;

}

button:hover{

transform:translateY(-4px);

box-shadow:
0 10px 20px rgba(255,255,255,.4);

}

button:disabled{

opacity:.6;

cursor:not-allowed;

}

.result{

display:none;

margin-top:25px;

padding:25px;

border-radius:25px;

background:rgba(255,255,255,.18);

animation:resultPop .8s;

position:relative;

overflow:hidden;
}

.resultEmoji{

font-size:60px;

animation:pulse 1s infinite;
}

#relation{

margin:15px 0;
font-size:30px;
font-weight:bold;

}

#details{

font-size:15px;

opacity:.9;
}

@keyframes resultPop{

0%{

opacity:0;

transform:
scale(.3)
rotate(-10deg);

}

100%{

opacity:1;

transform:
scale(1)
rotate(0deg);

}

}

@keyframes pulse{

0%{

transform:scale(1);

}

50%{

transform:scale(1.2);

}

100%{

transform:scale(1);

}

}

.burst{

position:absolute;
font-size:20px;

animation:burst 2s forwards;
}

@keyframes burst{

0%{

opacity:1;

transform:
translate(0,0)
scale(.5);

}

100%{

opacity:0;

transform:
translate(
var(--x),
var(--y)
)
scale(2);

}

}

.heart{

position:absolute;

opacity:.4;

animation:float linear infinite;

}

@keyframes float{

0%{

transform:
translateY(100vh);

opacity:0;

}

50%{

opacity:1;

}

100%{

transform:
translateY(-100px);

opacity:0;

}

}

</style>

</head>

<body>


<div class="container">

<h1>❤️ FLAMES</h1>

<p class="subtitle">
Find your relationship destiny
</p>

<div class="inputBox">
<input
id="name1"
placeholder="Enter First Name">
</div>

<div class="inputBox">
<input
id="name2"
placeholder="Enter Second Name">
</div>

<button
id="btn"
onclick="calculateFlames()">

Calculate Love

</button>


<div
class="result"
id="result">

<div
class="resultEmoji"
id="emoji">

❤️

</div>

<h2 id="relation"></h2>

<p id="details"></p>

</div>

</div>


<script>

const resultMap={

F:{
text:"Friendship",
emoji:"🤝"
},

L:{
text:"Love",
emoji:"❤️"
},

A:{
text:"Affection",
emoji:"😊"
},

M:{
text:"Marriage",
emoji:"💍"
},

E:{
text:"Enemy",
emoji:"😡"
},

S:{
text:"Sister",
emoji:"👭"
}

};


function createBurst(){

const result=
document.getElementById(
"result"
);

for(let i=0;i<12;i++){

let item=
document.createElement(
"div"
);

item.className=
"burst";

item.innerHTML="❤️";

item.style.left="50%";
item.style.top="50%";

item.style.setProperty(
"--x",
(Math.random()*300-150)+"px"
);

item.style.setProperty(
"--y",
(Math.random()*300-150)+"px"
);

result.appendChild(item);

setTimeout(()=>{

item.remove();

},2000);

}

}


function calculateFlames(){

let btn=
document.getElementById(
"btn"
);

btn.disabled=true;

let name1=
document
.getElementById(
"name1"
)
.value
.trim()
.replace(/\s/g,'');

let name2=
document
.getElementById(
"name2"
)
.value
.trim()
.replace(/\s/g,'');


if(!name1||!name2){

alert(
"Please enter both names"
);

btn.disabled=false;

return;
}


let total=
name1.length+
name2.length;


let flames=
["F","L","A","M","E","S"];


/* YOUR RULE */

while(
flames.length>1
){

let removeIndex=
(total-1)
%
flames.length;

flames.splice(
removeIndex,
1
);

}


let final=
resultMap[
flames[0]
];


let result=
document.getElementById(
"result"
);

result.style.display=
"block";

result.style.animation=
"none";

result.offsetHeight;

result.style.animation=
"resultPop .8s";


document.getElementById(
"emoji"
)
.innerHTML=
final.emoji;

document.getElementById(
"relation"
)
.innerHTML=
final.text;

document.getElementById(
"details"
)
.innerHTML=
`
${name1} ❤️ ${name2}
<br><br>
Total letters: ${total}
`;

createBurst();

btn.disabled=false;

}


/* floating hearts */

for(
let i=0;
i<25;
i++
){

let heart=
document.createElement(
"div"
);

heart.className=
"heart";

heart.innerHTML=
"❤️";

heart.style.left=
Math.random()*100+"%";

heart.style.fontSize=
(Math.random()*20+10)+"px";

heart.style.animationDuration=
(Math.random()*8+5)+"s";

document.body.appendChild(
heart
);

}

</script>

</body>
</html>
