<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FLAMES Love Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
background:linear-gradient(135deg,#ff416c,#ff4b2b);
overflow-x:hidden;
}

.container{

width:450px;
padding:30px;
border-radius:25px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(15px);

box-shadow:0 8px 30px rgba(0,0,0,.3);

text-align:center;

color:white;

z-index:10;

}

h1{
margin-bottom:10px;
}

.subtitle{
margin-bottom:20px;
opacity:.8;
}

input{

width:100%;
padding:14px;

border:none;

outline:none;

margin-bottom:15px;

border-radius:12px;

background:rgba(255,255,255,.2);

color:white;
}

input::placeholder{

color:rgba(255,255,255,.7);

}

button{

width:100%;
padding:14px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:bold;

font-size:16px;

background:white;

color:#ff416c;

}

button:disabled{

opacity:.5;

cursor:not-allowed;

}

.processBox{

margin-top:20px;

padding:20px;

border-radius:20px;

background:rgba(255,255,255,.1);

display:none;

}

.flamesDisplay{

display:flex;

justify-content:center;

gap:12px;

margin:20px 0;

flex-wrap:wrap;

}

.letter{

width:50px;

height:50px;

display:flex;

justify-content:center;

align-items:center;

background:rgba(255,255,255,.2);

border-radius:50%;

font-size:22px;

font-weight:bold;

transition:.5s;

}

.active{

background:white;

color:#ff416c;

transform:scale(1.2);

}

.removed{

background:red;

transform:scale(.5);

opacity:.2;

}

#stepText{

min-height:45px;

line-height:25px;

}

.result{

margin-top:20px;

padding:20px;

display:none;

border-radius:20px;

background:rgba(255,255,255,.2);

animation:zoom .6s;

}

@keyframes zoom{

from{

opacity:0;

transform:scale(.5);

}

to{

opacity:1;

transform:scale(1);

}

}

.heart{

position:absolute;

opacity:.4;

animation:float linear infinite;

}

@keyframes float{

0%{

transform:translateY(100vh);

opacity:0;

}

50%{

opacity:1;

}

100%{

transform:translateY(-100px);

opacity:0;

}

}

</style>

</head>

<body>


<div class="container">

<h1>❤️ FLAMES</h1>

<p class="subtitle">

Find your relationship destiny

</p>


<input
id="name1"
placeholder="Enter First Name">

<input
id="name2"
placeholder="Enter Second Name">


<button
id="btn"
onclick="calculateFlames()">

Calculate Love

</button>


<div
class="processBox"
id="processBox">

<h3>FLAMES Process</h3>

<div
class="flamesDisplay"
id="flamesDisplay">

</div>

<div id="stepText"></div>

</div>


<div
class="result"
id="result">

<h2 id="relation"></h2>

<p id="details"></p>

</div>

</div>


<script>

const resultMap={

F:"🤝 Friendship",
L:"❤️ Love",
A:"😊 Affection",
M:"💍 Marriage",
E:"😡 Enemy",
S:"👭 Sister"

};


function sleep(ms){

return new Promise(
r=>setTimeout(r,ms)
);

}


function draw(flames){

let html="";

flames.forEach(letter=>{

html+=`
<div class="letter">
${letter}
</div>
`;

});

document.getElementById(
"flamesDisplay"
).innerHTML=html;

}



async function calculateFlames(){

const btn=
document.getElementById("btn");

btn.disabled=true;

let name1=
document.getElementById("name1")
.value
.trim()
.replace(/\s/g,'');

let name2=
document.getElementById("name2")
.value
.trim()
.replace(/\s/g,'');


if(!name1||!name2){

alert("Enter both names");

btn.disabled=false;

return;

}


let total=
name1.length+
name2.length;


document.getElementById(
"processBox"
).style.display="block";

document.getElementById(
"result"
).style.display="none";


let flames=[
"F",
"L",
"A",
"M",
"E",
"S"
];


let step=
document.getElementById(
"stepText"
);

step.innerHTML=
`Total letters = ${total}`;


while(
flames.length>1
){

draw(flames);

let removeIndex=0;


/* Restart count from beginning */

for(
let count=1;
count<=total;
count++
){

let letters=
document.querySelectorAll(
".letter"
);

letters.forEach(x=>
x.classList.remove(
"active"
)
);

removeIndex=
(count-1)
%
flames.length;

letters[
removeIndex
]
.classList.add(
"active"
);

step.innerHTML=
`Counting ${count}/${total}`;

await sleep(500);

}


/* Remove */

let letters=
document.querySelectorAll(
".letter"
);

letters[
removeIndex
]
.classList.add(
"removed"
);

step.innerHTML=
`❌ Removed : ${flames[removeIndex]}`;

await sleep(1000);


flames.splice(
removeIndex,
1
);

step.innerHTML=
`Remaining : ${flames.join(" ")}`;

await sleep(1000);

}


document.getElementById(
"result"
).style.display="block";

document.getElementById(
"relation"
).innerHTML=
resultMap[
flames[0]
];

document.getElementById(
"details"
).innerHTML=
`
${name1} ❤️ ${name2}
<br><br>
Total Letters:
${total}
`;

btn.disabled=false;

}


/* Floating hearts */

for(
let i=0;
i<20;
i++
){

let heart=
document.createElement(
"div"
);

heart.className=
"heart";

heart.innerHTML=
"❤️";

heart.style.left=
Math.random()*100+"%";

heart.style.fontSize=
(Math.random()*20+15)+"px";

heart.style.animationDuration=
(Math.random()*6+4)+"s";

document.body.appendChild(
heart
);

}

</script>

</body>

</html>
