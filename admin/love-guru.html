<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLAMES Love Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
padding:40px 0;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff416c,#ff4b2b);
overflow-x:hidden;
position:relative;
}

.container{
width:450px;
padding:30px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border-radius:25px;
box-shadow:0 8px 30px rgba(0,0,0,.3);
text-align:center;
color:white;
z-index:10;
}

h1{
font-size:32px;
margin-bottom:10px;
}

.subtitle{
margin-bottom:25px;
opacity:.8;
}

.inputBox{
margin-bottom:18px;
}

input{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:12px;
font-size:15px;
background:rgba(255,255,255,.2);
color:white;
}

input::placeholder{
color:rgba(255,255,255,.7);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:600;
background:white;
color:#ff416c;
transition:.4s;
}

button:hover{
transform:translateY(-3px);
}

button:disabled{
opacity:.5;
cursor:not-allowed;
}

.processBox{
margin-top:20px;
padding:20px;
border-radius:15px;
background:rgba(255,255,255,.1);
display:none;
}

.flamesDisplay{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin:20px 0;
min-height:60px;
}

.letter{

width:45px;
height:45px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
background:rgba(255,255,255,.2);
transition:.4s;
}

.active{
background:white;
color:#ff416c;
transform:scale(1.3);
}

.removed{
background:red;
transform:scale(.5);
opacity:.2;
}

#stepText{
min-height:40px;
line-height:25px;
}

.result{
margin-top:20px;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,.2);
display:none;
animation:zoom .6s ease;
}

.flames{
font-size:30px;
margin-bottom:10px;
}

@keyframes zoom{

0%{
opacity:0;
transform:scale(.5);
}

100%{
opacity:1;
transform:scale(1);
}

}

.heart{
position:absolute;
animation:float linear infinite;
opacity:.5;
}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:translateY(-100px);
opacity:0;
}

}

</style>

</head>

<body>

<div class="container">

<h1>❤️ FLAMES</h1>

<p class="subtitle">
Find your relationship destiny
</p>

<div class="inputBox">
<input
id="name1"
placeholder="Enter First Name">
</div>

<div class="inputBox">
<input
id="name2"
placeholder="Enter Second Name">
</div>

<button id="calculateBtn"
onclick="calculateFlames()">
Calculate Love
</button>


<div class="processBox" id="processBox">

<h3>FLAMES Process</h3>

<div
class="flamesDisplay"
id="flamesDisplay">
</div>

<div id="stepText"></div>

</div>


<div class="result" id="result">

<div class="flames">
🔥
</div>

<h2 id="relation"></h2>

<p id="details"></p>

</div>

</div>


<script>

const resultMap={

F:"🤝 Friendship",
L:"❤️ Love",
A:"😊 Affection",
M:"💍 Marriage",
E:"😡 Enemy",
S:"👭 Sister"

};

function sleep(ms){

return new Promise(
resolve=>setTimeout(resolve,ms)
);

}

function draw(arr){

let html="";

arr.forEach(letter=>{

html+=`
<div class="letter">
${letter}
</div>
`;

});

document
.getElementById(
"flamesDisplay"
)
.innerHTML=html;

}


async function calculateFlames(){

const btn=
document.getElementById(
"calculateBtn"
);

btn.disabled=true;

let name1=
document.getElementById(
"name1"
)
.value
.trim()
.replace(/\s/g,'');

let name2=
document.getElementById(
"name2"
)
.value
.trim()
.replace(/\s/g,'');


if(!name1||!name2){

alert("Please enter both names");

btn.disabled=false;

return;
}

document
.getElementById(
"result"
)
.style.display="none";

document
.getElementById(
"processBox"
)
.style.display="block";


let flames=[
"F",
"L",
"A",
"M",
"E",
"S"
];

let total=
name1.length+
name2.length;

let step=
document.getElementById(
"stepText"
);

step.innerHTML=
`Total Letters: ${total}`;

let index=0;


while(flames.length>1){

draw(flames);

for(
let count=1;
count<=total;
count++
){

let letters=
document.querySelectorAll(
".letter"
);

letters.forEach(
x=>x.classList.remove(
"active"
)
);

index=
index%
flames.length;

letters[index]
.classList.add(
"active"
);

step.innerHTML=
`Counting ${count}/${total}`;

await sleep(500);

index++;

}

index--;

let letters=
document.querySelectorAll(
".letter"
);

letters[index]
.classList.add(
"removed"
);

step.innerHTML=
`❌ Removed : ${flames[index]}`;

await sleep(1200);

flames.splice(
index,
1
);

if(
index>=flames.length
){
index=0;
}

step.innerHTML=
`Remaining : ${flames.join(" ")}`;

await sleep(1000);

}

document
.getElementById(
"result"
)
.style.display="block";

document
.getElementById(
"relation"
)
.innerHTML=
resultMap[
flames[0]
];

document
.getElementById(
"details"
)
.innerHTML=
`
${name1} ❤️ ${name2}
<br><br>
Total Letters:
${total}
`;

btn.disabled=false;

}



for(
let i=0;
i<20;
i++
){

let heart=
document.createElement(
"div"
);

heart.classList.add(
"heart"
);

heart.innerHTML="❤️";

heart.style.left=
Math.random()*100+"%";

heart.style.fontSize=
(Math.random()*20+15)+"px";

heart.style.animationDuration=
(Math.random()*6+4)+"s";

document.body.appendChild(
heart
);

}

</script>

</body>
</html>
